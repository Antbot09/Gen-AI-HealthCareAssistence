<div class="reminder-list-container">
  <div class="header">
    <h1>Medication Reminders</h1>
    <button mat-raised-button color="primary" routerLink="/add-reminder">
      <mat-icon>add</mat-icon>
      Add New Reminder
    </button>
  </div>

  <mat-form-field>
    <mat-label>Filter</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Search medications..." #input>
  </mat-form-field>

  <mat-table [dataSource]="dataSource" matSort>
    <!-- Medication Name Column -->
    <ng-container matColumnDef="medicationName">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Medication</mat-header-cell>
      <mat-cell *matCellDef="let reminder">{{reminder.medicationName}}</mat-cell>
    </ng-container>

    <!-- Dosage Column -->
    <ng-container matColumnDef="dosage">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Dosage</mat-header-cell>
      <mat-cell *matCellDef="let reminder">{{reminder.dosage}}</mat-cell>
    </ng-container>

    <!-- Next Due Column -->
    <ng-container matColumnDef="nextDueTime">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Next Due</mat-header-cell>
      <mat-cell *matCellDef="let reminder">{{reminder.nextDueTime | date:'short'}}</mat-cell>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
      <mat-cell *matCellDef="let reminder">
        <mat-chip-set>
          <mat-chip [color]="reminder.taken ? 'primary' : 'warn'" selected>
            {{reminder.taken ? 'Taken' : 'Due'}}
          </mat-chip>
        </mat-chip-set>
      </mat-cell>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
      <mat-cell *matCellDef="let reminder">
        <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Actions">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
          <button mat-menu-item (click)="markAsTaken(reminder)" *ngIf="!reminder.taken">
            <mat-icon>check</mat-icon>
            <span>Mark as Taken</span>
          </button>
          <button mat-menu-item (click)="editReminder(reminder)">
            <mat-icon>edit</mat-icon>
            <span>Edit</span>
          </button>
          <button mat-menu-item (click)="deleteReminder(reminder)">
            <mat-icon>delete</mat-icon>
            <span>Delete</span>
          </button>
        </mat-menu>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="4">No reminders matching the filter "{{input.value}}"</td>
    </tr>
  </mat-table>

  <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of reminders"></mat-paginator>
</div>
